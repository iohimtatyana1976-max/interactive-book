<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#050505">
  <title>Большой миф Словении</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="book-page" id="bookPage">
    <section class="serpent-panel" aria-label="Великий Змей">
      <img src="assets/great-serpent.jpg" alt="Великий Змей — исходный образ">
      <div class="image-shade"></div>
    </section>

    <section class="myth-panel" aria-label="Падение чешуек">
      <div class="heading">
        <span class="chapter">Большой миф Словении · Часть первая</span>
        <h1>Падение чешуек</h1>
        <p class="note">Текст мифа будет вставлен сюда без изменений после утверждения композиции.</p>
      </div>

      <div class="void" aria-hidden="true">
        <span class="star s1"></span>
        <span class="star s2"></span>
        <span class="star s3"></span>

        <div class="scale scale-one"></div>
        <div class="scale scale-two"></div>
        <div class="scale scale-three"></div>

        <div class="gold-dust"></div>
        <div class="impact">
          <i></i><i></i><i></i>
        </div>
      </div>
    </section>

    <button class="nav prev" id="prev" aria-label="Назад">‹</button>
    <button class="nav next" id="next" aria-label="Вперёд">›</button>

    <div class="status" id="status">Первая сцена</div>
  </main>

  <script src="script.js"></script>
</body>
</html>
