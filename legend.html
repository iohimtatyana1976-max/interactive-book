dient(circle at 50% 40%,#24412c,#020604 65%)}.final .end{text-align:center;padding:32px}.final h2{font-size:clamp(42px,7vw,82px);margin:0 0 18px}.final p{font-size:20px;line-height:1.6;color:#ddd7c4}.final a{display:inline-block;margin-top:16px;color:#211506;background:linear-gradient(135deg,#f5dfa0,#a97929);padding:14px 22px;border-radius:999px;text-decoration:none;font:bold 15px Arial}@media(max-width:700px){header{padding:0 10px}.title{font-size:11px}figcaption{bottom:80px;font-size:13px;max-width:90vw;overflow:hidden;text-overflow:ellipsis}}

const book=document.getElementById('book'), slides=[...document.querySelectorAll('.slide')], count=document.getElementById('count');let i=0;function go(n){i=Math.max(0,Math.min(slides.length-1,n));slides[i].scrollIntoView({behavior:'smooth'});count.textContent=(i+1)+' / '+slides.length}document.getElementById('prev').onclick=()=>go(i-1);document.getElementById('next').onclick=()=>go(i+1);document.addEventListener('keydown',e=>{if(e.key==='ArrowRight'||e.key===' ')go(i+1);if(e.key==='ArrowLeft')go(i-1)});book.addEventListener('scroll',()=>{clearTimeout(window.st);window.st=setTimeout(()=>{let w=innerWidth;i=Math.round(book.scrollLeft/w);count.textContent=(i+1)+' / '+slides.length},100)});document.getElementById('full').onclick=()=>{document.fullscreenElement?document.exitFullscreen():document.documentElement.requestFullscreen()};
