<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Сказочная Словения — V15</title>
<style>
:root{--gold:#e8c96f;--ink:#07100b;--ivory:#fff6da}
*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#020705;color:var(--ivory);font-family:Georgia,'Times New Roman',serif}
button{font:inherit}.scene{position:fixed;inset:0;opacity:0;visibility:hidden;pointer-events:none;transition:opacity 1.4s ease,visibility 1.4s}.scene.active{opacity:1;visibility:visible;pointer-events:auto}
#intro{background:#020705}.frame{position:absolute;inset:-5%;opacity:0;background-position:center;background-size:cover;will-change:transform,opacity,filter;transition:opacity 2.1s ease;filter:saturate(.92) contrast(1.04) brightness(.72)}.frame.active{opacity:1}.frame::after{content:"";position:absolute;inset:0;background:radial-gradient(circle at 50% 43%,transparent 0 29%,rgba(0,0,0,.12) 55%,rgba(0,0,0,.74) 100%),linear-gradient(0deg,rgba(0,0,0,.52),transparent 48%)}
#intro::before{content:"";position:absolute;inset:0;z-index:3;pointer-events:none;background:linear-gradient(90deg,rgba(0,0,0,.22),transparent 24%,transparent 76%,rgba(0,0,0,.22));mix-blend-mode:multiply}
#mist{position:absolute;inset:-15%;z-index:2;pointer-events:none;opacity:.22;background:radial-gradient(ellipse at 30% 70%,rgba(225,240,218,.16),transparent 35%),radial-gradient(ellipse at 70% 60%,rgba(225,240,218,.12),transparent 38%);animation:mist 18s ease-in-out infinite alternate}
#particles{position:absolute;inset:0;z-index:4;pointer-events:none;overflow:hidden}.particle{position:absolute;width:3px;height:3px;border-radius:50%;background:#ffe9a5;box-shadow:0 0 12px 4px rgba(255,221,119,.45);opacity:0;animation:float var(--d) linear infinite;animation-delay:var(--delay)}
.caption{position:absolute;z-index:7;left:50%;bottom:15vh;transform:translateX(-50%);width:min(1000px,88vw);text-align:center;text-shadow:0 4px 28px #000;pointer-events:none}.caption h1,.caption p{margin:0;opacity:0;transform:translateY(20px);transition:opacity 1.5s ease,transform 1.5s ease}.caption h1{font-weight:500;font-size:clamp(3rem,7vw,7.8rem);line-height:.9}.caption p{margin-top:1rem;color:#f0d58e;font:600 clamp(.85rem,1.8vw,1.35rem)/1.2 Arial,sans-serif;letter-spacing:.18em;text-transform:uppercase}.caption.show h1,.caption.show p{opacity:1;transform:none}.mode-shh .caption h1{font-size:clamp(5rem,14vw,12rem);font-style:italic;color:#fff0b2}.mode-follow .caption h1{font-size:clamp(2.3rem,5vw,5rem);font-style:italic}.mode-final .caption{bottom:18vh}.mode-final .caption h1{font-size:clamp(3.2rem,7.5vw,8rem)}
#enter{position:absolute;z-index:9;left:50%;bottom:8vh;transform:translate(-50%,20px);opacity:0;pointer-events:none;border:1px solid rgba(232,201,111,.65);border-radius:999px;padding:.95rem 1.45rem;background:linear-gradient(135deg,#f5e1a2,#ae7c2e);color:#211406;font:700 1rem Arial,sans-serif;cursor:pointer;box-shadow:0 0 35px rgba(232,201,111,.22);transition:opacity 1.2s ease,transform 1.2s ease}.mode-final #enter.visible{opacity:1;transform:translate(-50%,0);pointer-events:auto}
#skip{position:absolute;z-index:9;right:18px;top:18px;border:1px solid rgba(255,255,255,.22);border-radius:999px;padding:.55rem .85rem;background:rgba(3,10,7,.48);color:rgba(255,255,255,.72);font:12px Arial;cursor:pointer;backdrop-filter:blur(8px)}
#progress{position:absolute;z-index:9;left:0;bottom:0;width:100%;height:2px;background:rgba(255,255,255,.08)}#progress span{display:block;height:100%;width:0;background:var(--gold);transition:width 1s linear}
.mode-forest .frame.active{animation:push 8s ease-out both}.mode-unicorn .frame.active{animation:breathe 7s ease-in-out infinite}.mode-ferns .frame.active,.mode-shkrat .frame.active,.mode-look .frame.active{animation:creep 7s ease-out both}.mode-shh .frame.active{animation:hold 5s ease-in-out both}.mode-follow .frame.active,.mode-book .frame.active{animation:walk 7s ease-in-out both}.mode-glow .frame.active{animation:glow 6s ease-in-out both}.mode-treegrow .frame.active{animation:rise 8s cubic-bezier(.16,.7,.18,1) both}.mode-stars .frame.active{animation:stars 7s ease-in-out both}.mode-final .frame.active{animation:finale 12s ease-out both;filter:saturate(1) contrast(1.05) brightness(.96)}
@keyframes push{from{transform:scale(1.12) translate3d(-1.5%,1%,0)}to{transform:scale(1.03) translate3d(.6%,-.3%,0)}}@keyframes breathe{0%,100%{transform:scale(1.045)}50%{transform:scale(1.065)}}@keyframes creep{from{transform:scale(1.11) translateX(-1%)}to{transform:scale(1.035) translateX(.7%)}}@keyframes hold{0%{transform:scale(1.05)}50%{transform:scale(1.04)}100%{transform:scale(1.045)}}@keyframes walk{0%{transform:scale(1.14) translateX(-2%)}100%{transform:scale(1.02) translateX(1.2%)}}@keyframes glow{0%{transform:scale(1.1);filter:brightness(.58) saturate(.85)}58%{filter:brightness(1.18) saturate(1.12)}100%{transform:scale(1.025);filter:brightness(.92)}}@keyframes rise{0%{transform:scale(1.22) translateY(5%);filter:brightness(.62)}100%{transform:scale(1.015) translateY(0);filter:brightness(.98)}}@keyframes stars{0%{transform:scale(1.07);filter:brightness(.66)}60%{filter:brightness(1.05)}100%{transform:scale(1.015);filter:brightness(.94)}}@keyframes finale{from{transform:scale(1.06)}to{transform:scale(1)}}@keyframes mist{from{transform:translate3d(-2%,1%,0) scale(1)}to{transform:translate3d(2%,-1%,0) scale(1.06)}}@keyframes float{0%{transform:translate3d(0,20px,0);opacity:0}20%{opacity:.55}70%{opacity:.25}100%{transform:translate3d(var(--x),-110px,0);opacity:0}}
#world{background:#030805 center/cover no-repeat}.world-shade{position:absolute;inset:0;background:radial-gradient(circle at 55% 40%,transparent 0 28%,rgba(0,0,0,.2) 55%,rgba(0,0,0,.78) 100%),linear-gradient(0deg,rgba(0,0,0,.7),transparent 50%)}.world-copy{position:absolute;z-index:3;left:clamp(24px,6vw,90px);bottom:clamp(28px,8vh,90px);width:min(650px,86vw)}.world-copy .eyebrow{color:var(--gold);font:700 .72rem Arial;letter-spacing:.2em;text-transform:uppercase}.world-copy h2{font-size:clamp(3rem,7vw,7rem);line-height:.88;margin:.5rem 0}.world-copy p{font-size:clamp(1rem,1.6vw,1.25rem);line-height:1.55}.stars-map{position:absolute;z-index:4;inset:8% 8% 23% 30%}.star{position:absolute;width:15px;height:15px;border:0;border-radius:50%;background:#fff0b0;box-shadow:0 0 18px 6px rgba(255,221,119,.65);cursor:pointer;animation:pulse 2.8s infinite}.star span{position:absolute;left:50%;bottom:24px;transform:translateX(-50%);white-space:nowrap;padding:.35rem .55rem;border:1px solid rgba(232,201,111,.5);border-radius:999px;background:rgba(0,0,0,.75);color:white;opacity:0;transition:.25s}.star:hover span,.star:focus span{opacity:1}@keyframes pulse{50%{transform:scale(1.25);opacity:.72}}
#book{display:grid;place-items:center;padding:60px 18px;background:radial-gradient(circle,rgba(160,110,40,.23),transparent 45%),#060908}.bookwrap{display:grid;grid-template-columns:.9fr 1.1fr;width:min(960px,94vw);min-height:min(650px,74vh)}.cover,.page{padding:clamp(28px,5vw,70px)}.cover{display:grid;place-content:center;text-align:center;color:#fff0b3;background:#302017;border:1px solid #76562c;border-radius:16px 0 0 16px}.cover h3,.page h3{font-size:clamp(2rem,4vw,4.3rem);line-height:.95;margin:.4rem 0}.page{color:#291b10;background:#eee2c1;border-radius:0 16px 16px 0}.page p{font-size:clamp(1.05rem,1.7vw,1.35rem);line-height:1.6}.back,.openbook{border:1px solid rgba(232,201,111,.6);border-radius:999px;padding:.75rem 1.05rem;background:rgba(5,16,10,.75);color:white;cursor:pointer}.back{position:absolute;top:20px;left:20px}.openbook{margin-top:1rem}
@media(max-width:720px){#skip{top:max(12px,env(safe-area-inset-top));right:12px}.caption{bottom:18vh}.mode-final .caption{bottom:23vh}#enter{bottom:11vh}.world-copy{bottom:22px}.stars-map{inset:6% 5% 34% 18%}.bookwrap{display:block;max-height:82vh;overflow:auto}.cover{border-radius:16px 16px 0 0}.page{border-radius:0 0 16px 16px}}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;animation-iteration-count:1!important;transition-duration:.01ms!important}}
</style>
</head>
<body>
<section class="scene active" id="intro">
<div id="frames"></div><div id="mist"></div><div id="particles"></div>
<div class="caption" id="caption"><h1 id="title"></h1><p id="subtitle"></p></div>
<button id="skip">Перейти к книге</button><button id="enter">Начать путешествие</button><div id="progress"><span></span></div>
</section>
<section class="scene" id="world"><div class="world-shade"></div><div class="stars-map" id="starsMap"></div><div class="world-copy"><div class="eyebrow">Книга двенадцати созвездий</div><h2>Сказочная<br>Словения</h2><p>Откройте волшебную книгу и войдите в мир сказочной Словении.</p><button class="openbook" id="openBook">Открыть книгу</button></div></section>
<section class="scene" id="book"><button class="back" id="back">← Вернуться к Великой Липе</button><div class="bookwrap"><div class="cover"><div><div style="color:var(--gold);font:700 .72rem Arial;letter-spacing:.18em;text-transform:uppercase">Книга двенадцати созвездий</div><h3>Сказочная<br>Словения</h3></div></div><article class="page"><div style="color:#8a6727;font:700 .72rem Arial;letter-spacing:.18em;text-transform:uppercase">Пролог</div><h3>Большой миф Словении</h3><p>Здесь начинается древняя история Словении — история Великого Змея, Великой Липы и двенадцати созвездий.</p></article></div></section>
<script>
const images=["assets/intro/intro_01_6ee65d80250f.webp","assets/intro/intro_02_ee8ab6679a86.webp","assets/intro/intro_03_b9cfc3aa04a4.webp","assets/intro/intro_04_67f7b6e87a3b.webp","assets/intro/intro_05_932551979a9d.webp","assets/intro/intro_06_44b6a197efed.webp","assets/intro/intro_07_a90c5d126ef9.webp","assets/intro/intro_08_05ca728083a4.webp","assets/intro/intro_09_cc9b469f6d93.webp","assets/intro/intro_10_d7c7334f43c1.webp","assets/intro/intro_11_439410f9e6ed.webp"];
const story=[
{mode:'forest',image:0,ms:4800},
{mode:'ferns',image:1,ms:4200},
{mode:'shkrat',image:2,ms:4200},
{mode:'shh',image:3,title:'Тс-с-с…',ms:3600},
{mode:'reveal',image:4,ms:4600},
{mode:'follow',image:5,title:'Следуй за мной…',ms:4300},
{mode:'book',image:6,ms:5000},
{mode:'glow',image:7,ms:5600},
{mode:'treegrow',image:8,ms:6500},
{mode:'stars',image:9,ms:6000},
{mode:'final',image:10,title:'Сказочная Словения',subtitle:'Книга двенадцати созвездий',ms:999999}
];
const frames=document.getElementById('frames');images.forEach((src,i)=>{const d=document.createElement('div');d.className='frame';d.style.backgroundImage=`url("${src}")`;frames.appendChild(d)});const all=[...document.querySelectorAll('.frame')];
const intro=document.getElementById('intro'),caption=document.getElementById('caption'),title=document.getElementById('title'),subtitle=document.getElementById('subtitle'),prog=document.querySelector('#progress span'),enter=document.getElementById('enter');let index=0,timer;
function render(i){index=Math.max(0,Math.min(story.length-1,i));const s=story[index];
all.forEach((f,n)=>{f.classList.remove('active');if(n===s.image){void f.offsetWidth;f.classList.add('active')}});intro.className='scene active mode-'+s.mode;title.textContent=s.title||'';subtitle.textContent=s.subtitle||'';caption.classList.toggle('show',!!(s.title||s.subtitle));enter.classList.remove('visible');prog.style.width=((index+1)/story.length*100)+'%';clearTimeout(timer);if(s.mode==='shh')setTimeout(()=>caption.classList.remove('show'),2100);if(s.mode==='final')setTimeout(()=>enter.classList.add('visible'),2400);else timer=setTimeout(()=>render(index+1),s.ms)}
function show(id){clearTimeout(timer);document.querySelectorAll('.scene').forEach(s=>s.classList.toggle('active',s.id===id))}
document.getElementById('skip').onclick=()=>{render(story.length-1)};enter.onclick=()=>show('world');document.getElementById('openBook').onclick=()=>{parent.postMessage('open-legend','*')};document.getElementById('back').onclick=()=>show('world');
const pbox=document.getElementById('particles');for(let i=0;i<26;i++){const p=document.createElement('i');p.className='particle';p.style.left=Math.random()*100+'%';p.style.top=(45+Math.random()*50)+'%';p.style.setProperty('--d',(7+Math.random()*9)+'s');p.style.setProperty('--delay',(-Math.random()*12)+'s');p.style.setProperty('--x',(-40+Math.random()*80)+'px');pbox.appendChild(p)}
document.getElementById('world').style.backgroundImage=`url("${images[10]}")`;const pts=[[24,27],[38,18],[51,14],[64,16],[77,24],[83,38],[79,52],[67,62],[53,65],[39,61],[27,52],[20,40]],map=document.getElementById('starsMap');pts.forEach((p,i)=>{const b=document.createElement('button');b.className='star';b.style.left=p[0]+'%';b.style.top=p[1]+'%';b.style.animationDelay=(i*.17)+'s';b.innerHTML=`<span>Созвездие ${i+1}</span>`;map.appendChild(b)});
console.info('Сказочная Словения V15 — последовательность кадров пересобрана');
render(0);
</script>
</body></html>
